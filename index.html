<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>藤の呪縛</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Shippori+Mincho:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --wisteria-light: #c9a8e8;
    --wisteria-mid: #7b4fa6;
    --wisteria-dark: #2a0a3d;
    --madness: #1a0025;
    --blood: #4a0020;
    --cream: #fdf6ee;
    --floral: #f5c6d8;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Shippori Mincho', 'Noto Serif JP', serif;
    background: #0a0010;
    color: white;
    cursor: pointer;
  }

  #stage {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: background 2s ease;
    z-index: 1;
  }

  canvas {
    position: fixed;
    inset: 0;
    z-index: 5;
    pointer-events: none;
  }

  #overlay {
    position: fixed;
    inset: 0;
    z-index: 6;
    pointer-events: none;
    background: transparent;
    transition: background 3s ease;
  }

  /* pulse overlay for stage 2 */
  #pulse {
    position: fixed;
    inset: 0;
    z-index: 7;
    pointer-events: none;
    opacity: 0;
    background: radial-gradient(ellipse at center, rgba(80,0,40,0.6) 0%, transparent 70%);
    animation: none;
  }

  @keyframes heartbeat {
    0%,100% { opacity: 0; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.05); }
  }

  .content {
    position: relative;
    z-index: 20;
    text-align: center;
    padding: 2rem;
    max-width: 480px;
    width: 90%;
  }

  .stage-label {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    opacity: 0.5;
    margin-bottom: 2rem;
    text-transform: uppercase;
  }

  .main-text {
    font-size: clamp(1.2rem, 4vw, 1.7rem);
    line-height: 2.2;
    font-weight: 300;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 1.5s ease, transform 1.5s ease;
    letter-spacing: 0.1em;
  }

  .main-text.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .sub-text {
    font-size: 0.85rem;
    opacity: 0;
    margin-top: 3rem;
    letter-spacing: 0.2em;
    color: rgba(255,255,255,0.5);
    transition: opacity 2s ease 1s;
  }

  .sub-text.visible { opacity: 1; }

  /* Stage 1 - 恋に酔う */
  .s1 { background: linear-gradient(160deg, #1a0830 0%, #3d1a5c 40%, #1a0830 100%); }

  /* Stage 2 - 狂気 */
  .s2 { background: linear-gradient(160deg, #0a0010 0%, #1a0025 50%, #2a0015 100%); }

  /* Stage 3 - 岐路 */
  .s3 {
    background: linear-gradient(165deg, #0f0818 0%, #1a0e2a 42%, #12081f 100%);
  }

  .s3 .stage-label {
    color: rgba(186, 168, 214, 0.55);
  }

  .s3 .main-text {
    color: #ddd0ef;
  }

  .s3 .choice-btn {
    border: 1px solid rgba(132, 98, 168, 0.55);
    background: rgba(38, 24, 58, 0.72);
    color: #e6dcf5;
  }

  .s3 .choice-btn::before {
    background: rgba(118, 82, 158, 0.28);
  }

  .s3 .choice-btn:hover {
    border-color: rgba(168, 138, 205, 0.8);
    background: rgba(52, 34, 78, 0.88);
    color: #f4eefc;
    letter-spacing: 0.35em;
  }

  .s3 .choice-stay {
    border-color: rgba(145, 108, 185, 0.62);
    background: rgba(44, 28, 66, 0.75);
  }

  .s3 .choice-leave {
    border-color: rgba(118, 88, 158, 0.58);
    background: rgba(34, 22, 52, 0.75);
  }

  /* Stage 4 - 真実 */
  .s4 { background: #000000; }

  /* Stage 5 - 再生 */
  .s5 { background: linear-gradient(160deg, #0f0820 0%, #1a0d30 50%, #0f0820 100%); }

  /* Choice buttons */
  .choices {
    display: none;
    gap: 1.5rem;
    margin-top: 3rem;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    transition: opacity 2s ease 2s;
  }

  .choices.visible { opacity: 1; }
  .choices.show { display: flex; }

  .choice-btn {
    padding: 0.9rem 2.5rem;
    border: 1px solid rgba(255,255,255,0.3);
    background: transparent;
    color: white;
    font-family: 'Shippori Mincho', serif;
    font-size: 1rem;
    letter-spacing: 0.25em;
    cursor: pointer;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
  }

  .choice-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.05);
    transform: scaleX(0);
    transition: transform 0.4s ease;
    transform-origin: left;
  }

  .choice-btn:hover::before { transform: scaleX(1); }
  .choice-btn:hover { border-color: var(--wisteria-light); letter-spacing: 0.35em; }

  .choice-stay { border-color: rgba(120, 60, 180, 0.6); }
  .choice-leave { border-color: rgba(180, 60, 80, 0.4); }

  /* Floral particles */
  .petal {
    position: fixed;
    pointer-events: none;
    z-index: 5;
    width: 8px; height: 8px;
    border-radius: 50% 0 50% 0;
    opacity: 0;
    animation: fall linear forwards;
  }

  @keyframes fall {
    0% { opacity: 0.8; transform: translateY(0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translateY(60vh) rotate(720deg) scale(0.3); }
  }

  /* Stage 4 truth message */
  .truth-box {
    border-left: 2px solid rgba(150, 80, 200, 0.4);
    padding: 1.5rem 1.5rem;
    text-align: left;
    line-height: 2.4;
    font-size: clamp(0.9rem, 3vw, 1.1rem);
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 2s ease, transform 2s ease;
  }

  .truth-box.visible { opacity: 1; transform: translateY(0); }

  .truth-box em {
    font-style: normal;
    color: var(--wisteria-light);
  }

  .s4-truth-typewriter {
    border-left: none;
    text-align: center;
    color: #b898e8;
    padding: 1.25rem 1rem;
    font-size: clamp(0.92rem, 3.1vw, 1.1rem);
    line-height: 2.35;
    letter-spacing: 0.05em;
    max-width: 28em;
    margin-left: auto;
    margin-right: auto;
  }

  /* Stage 5 main text accents */
  .s5 .main-text { padding-top: 0.25rem; }
  .s5-text-pink {
    color: #f0a8d0;
    display: inline-block;
    margin-top: 2.75rem;
  }

  .s5-rotating-msg {
    margin-top: 1.75rem;
    font-size: clamp(0.82rem, 3.1vw, 0.98rem);
    line-height: 2;
    letter-spacing: 0.06em;
    font-weight: 400;
    min-height: 4em;
    max-width: 22em;
    margin-left: auto;
    margin-right: auto;
    opacity: 0;
    transition: opacity 1.2s ease, color 0.85s ease;
  }
  .s5-rotating-msg.visible { opacity: 1; }

  .back-home {
    position: fixed;
    top: 0.85rem;
    left: 0.75rem;
    z-index: 30;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    padding: 0.35rem 0.65rem;
    color: rgba(255, 255, 255, 0.55);
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 999px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 300;
    -webkit-tap-highlight-color: transparent;
  }
  .back-home:hover { color: rgba(255, 255, 255, 0.88); }

  /* デフォルト非表示（[hidden] より .s5-share-bar の display が勝つブラウザ対策） */
  .s5-share-bar {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    display: none;
    justify-content: center;
    pointer-events: auto;
  }
  .s5-share-bar.is-visible {
    display: flex;
  }
  .s5-share-btn {
    padding: 0.65rem 1.35rem;
    font-size: 0.78rem;
    letter-spacing: 0.06em;
    color: rgba(255, 255, 255, 0.88);
    background: rgba(25, 18, 40, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 999px;
    cursor: pointer;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .s5-share-btn:hover { background: rgba(35, 28, 55, 0.6); }

  /* Screen shake */
  @keyframes shake {
    0%,100% { transform: translate(0,0) rotate(0deg); }
    10% { transform: translate(-3px, 2px) rotate(-0.5deg); }
    20% { transform: translate(3px, -2px) rotate(0.5deg); }
    30% { transform: translate(-2px, 3px) rotate(-0.3deg); }
    50% { transform: translate(2px, -1px) rotate(0.3deg); }
    70% { transform: translate(-1px, 2px) rotate(-0.2deg); }
  }

  .shake { animation: shake 0.6s ease; }

  /* Tap hint */
  .tap-hint {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    opacity: 0.3;
    z-index: 25;
    animation: blink 2s ease infinite;
  }

  @keyframes blink {
    0%,100% { opacity: 0.3; }
    50% { opacity: 0.6; }
  }

  /* Progress dots */
  .dots {
    position: fixed;
    bottom: 3.5rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 0.6rem;
    z-index: 25;
  }

  .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: background 0.5s, transform 0.5s;
  }

  .dot.active {
    background: var(--wisteria-light);
    transform: scale(1.5);
  }

  /* Vignette */
  #vignette {
    position: fixed;
    inset: 0;
    z-index: 8;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
  }

  /* Glitch text effect for stage 2 */
  @keyframes glitch {
    0%,100% { clip-path: inset(0 0 100% 0); transform: skewX(0deg); }
    5% { clip-path: inset(20% 0 60% 0); transform: skewX(-5deg); }
    10% { clip-path: inset(50% 0 30% 0); transform: skewX(3deg); }
    15% { clip-path: inset(10% 0 80% 0); transform: skewX(-2deg); }
    20%,100% { clip-path: inset(0 0 100% 0); }
  }

  .glitch-wrap { position: relative; }
  .glitch-wrap::before, .glitch-wrap::after {
    content: attr(data-text);
    position: absolute;
    left: 0; top: 0; width: 100%;
    opacity: 0.4;
  }
  .glitch-wrap::before {
    color: #ff006a;
    animation: glitch 3s infinite;
    text-shadow: 2px 0 #ff006a;
  }
  .glitch-wrap::after {
    color: #00ffff;
    animation: glitch 3s infinite 0.15s;
    text-shadow: -2px 0 #00ffff;
    transform: skewX(2deg);
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="overlay"></div>
<div id="pulse"></div>
<div id="vignette"></div>

<div id="stage" class="s1">
  <div class="content">
    <div class="stage-label" id="stageLabel">Stage 1 — 恋に酔う</div>
    <div class="main-text" id="mainText"></div>
    <div class="truth-box" id="truthBox"></div>
    <div class="choices show" id="choices">
      <button class="choice-btn choice-stay" onclick="choose('stay')">愛し続ける</button>
      <button class="choice-btn choice-leave" onclick="choose('leave')">離れる</button>
    </div>
    <div class="sub-text" id="subText"></div>
  </div>
</div>

<div class="dots">
  <div class="dot active" id="d0"></div>
  <div class="dot" id="d1"></div>
  <div class="dot" id="d2"></div>
  <div class="dot" id="d3"></div>
  <div class="dot" id="d4"></div>
</div>

<div class="tap-hint" id="tapHint">— tap —</div>

<button type="button" id="backHome" class="back-home" aria-label="最初の画面へ">↩ 最初へ</button>
<div id="s5ShareBar" class="s5-share-bar" style="display:none" aria-hidden="true">
  <button type="button" id="s5ShareBtn" class="s5-share-btn">このメッセージをシェアする</button>
</div>

<script>
// ─── Audio Engine ───────────────────────────────
let AC = null;
let masterGain = null;
let audioReady = false;
const MASTER_GAIN_BASE = 0.45;
const STAGE5_BGM_GAIN_MULT = 0.6;

function masterGainMultiplierForStage(stageIndex) {
  return stageIndex === 5 ? STAGE5_BGM_GAIN_MULT : 1;
}

function applyMasterGainForStage(stageIndex) {
  if (!masterGain) return;
  masterGain.gain.value = MASTER_GAIN_BASE * masterGainMultiplierForStage(stageIndex);
}

let s5AudioUnlockPrimed = false;

function stage5HeartReadyForVoice() {
  return (
    currentStage === 5 &&
    vines.length &&
    vines[0].rebirthHeartStem &&
    vines[0].morphPhase === 'done'
  );
}

function tryStage5VoiceResume() {
  if (!stage5HeartReadyForVoice() || !stage5ThemeT0) return;
  const idx = Math.floor((performance.now() - stage5ThemeT0) / 10000) % 6;
  if (idx !== 0) return;
  ensureStage5VoiceAudio();
  if (stage5VoiceAudio.paused || stage5VoiceAudio.ended) {
    stage5VoiceAudio.currentTime = 0;
    stage5VoiceAudio.play().catch(() => {});
  }
}

function initAudio() {
  if (audioReady) return;
  try {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = AC.createGain();
    masterGain.gain.value = MASTER_GAIN_BASE * masterGainMultiplierForStage(currentStage);
    masterGain.connect(AC.destination);
    audioReady = true;
  } catch(e) {
    console.warn('Audio init failed:', e);
  }
}

function resumeAudio(cb) {
  if (!audioReady) initAudio();
  if (!AC || !masterGain) { if (cb) cb(); return; }
  const afterUnlocked = () => {
    if (!s5AudioUnlockPrimed && AC) {
      s5AudioUnlockPrimed = true;
      try {
        const buf = AC.createBuffer(1, 1, 22050);
        const src = AC.createBufferSource();
        src.buffer = buf;
        src.connect(AC.destination);
        src.start(0);
      } catch (_) {}
    }
    tryStage5VoiceResume();
    if (cb) cb();
  };
  if (AC.state === 'suspended') {
    AC.resume().then(afterUnlocked).catch(afterUnlocked);
  } else {
    afterUnlocked();
  }
}

function playTone(freq, type='sine', dur=1.5, vol=0.12, delay=0) {
  if (!audioReady || !masterGain) return;
  try {
    const osc = AC.createOscillator();
    const g = AC.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, AC.currentTime);
    const t0 = AC.currentTime + delay;
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.linearRampToValueAtTime(vol, t0 + 0.1);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g);
    g.connect(masterGain);
    osc.start(t0);
    osc.stop(t0 + dur + 0.15);
  } catch(e) { console.warn('playTone error:', e); }
}

function playChord(freqs, type='sine', dur=2, vol=0.08) {
  freqs.forEach((f,i) => playTone(f, type, dur, vol, i*0.05));
}

function playWisteriaDrone() {
  if (!audioReady || !masterGain) return;
  [130.81, 164.81, 196, 261.63].forEach((f, idx) => {
    try {
      const osc = AC.createOscillator();
      const g = AC.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(f, AC.currentTime);
      const t0 = AC.currentTime + idx * 0.1;
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.linearRampToValueAtTime(0.055, t0 + 2);
      g.gain.setValueAtTime(0.055, t0 + 6);
      g.gain.linearRampToValueAtTime(0.0001, t0 + 8);
      osc.connect(g);
      g.connect(masterGain);
      osc.start(t0);
      osc.stop(t0 + 9);
    } catch(e) { console.warn(e); }
  });
}

function playMadnessDrone() {
  if (!audioReady || !masterGain) return;
  [55, 58.27, 65.41].forEach((f, i) => {
    try {
      const osc = AC.createOscillator();
      const g = AC.createGain();
      osc.type = i === 0 ? 'sawtooth' : 'square';
      osc.frequency.setValueAtTime(f, AC.currentTime);
      const t0 = AC.currentTime;
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.linearRampToValueAtTime(0.07, t0 + 1);
      g.gain.setValueAtTime(0.07, t0 + 5);
      g.gain.linearRampToValueAtTime(0.0001, t0 + 7);
      osc.connect(g);
      g.connect(masterGain);
      osc.start(t0);
      osc.stop(t0 + 8);
    } catch(e) { console.warn(e); }
  });
  playTone(880, 'sawtooth', 4, 0.025);
}

function playWindChime() {
  const freqs = [523.25, 659.25, 783.99, 1046.5, 1318.5];
  freqs.forEach((f,i) => playTone(f, 'sine', 3, 0.08, i * 0.3 + Math.random()*0.2));
}

function playFloralBurst() {
  [523.25, 659.25, 783.99, 1046.5, 1318.5, 1567.98].forEach((f,i) => {
    playTone(f, 'sine', 2.5, 0.07, i * 0.15);
  });
}

// ─── Canvas / Visual Engine ──────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, currentStage = 1, animId, particles = [], vines = [], flowers = [];
let choice = null;
let stage5ThemeT0 = 0;
let lastStage5ThemeIdx = -1;
let stage5ThemeStroke = [55, 155, 92];
let stage5ChromeTimer = null;
const STAGE5_SHARE_TEXT = 'あなたはあなた自身を愛でることを覚えていった';
/* index.html と同じフォルダに配置（mp3 / m4a / ogg 等。拡張子は下の定数に合わせる） */
const STAGE5_VOICE_SRC = 'stage5-voice2.mp3';
let stage5VoiceAudio = null;
let stage2DespairT0 = 0;
let stage4BgT0 = 0;
let stage4TypeTimer = null;
const STAGE4_TYPEWRITER_TEXT =
  '巻き付いてた執着は　あなたではなく　愛されたかった私自身だったかもしれない';
const STAGE4_TYPEWRITER_TEXT_STAY = '愛してるのは相手？愛されたいだけ？';

function rgbLerp(a, b, t) {
  return {
    r: Math.round(a.r + (b.r - a.r) * t),
    g: Math.round(a.g + (b.g - a.g) * t),
    b: Math.round(a.b + (b.b - a.b) * t)
  };
}
function rgbToCss(c) {
  return `rgb(${c.r},${c.g},${c.b})`;
}
function stage4AnimatedBackground(t) {
  t = Math.min(1, Math.max(0, t));
  const black = { r: 0, g: 0, b: 0 };
  const darkPurple = { r: 32, g: 10, b: 52 };
  const flowerPurple = { r: 123, g: 79, b: 166 };
  let cTop, cBot;
  if (t < 0.5) {
    const u = t * 2;
    cTop = rgbLerp(black, darkPurple, u);
    cBot = rgbLerp(black, darkPurple, u);
  } else {
    const u = (t - 0.5) * 2;
    cTop = rgbLerp(darkPurple, flowerPurple, u);
    cBot = rgbLerp(darkPurple, flowerPurple, u);
  }
  const cMid = rgbLerp(cTop, cBot, 0.45);
  return `linear-gradient(165deg, ${rgbToCss(cTop)} 0%, ${rgbToCss(cMid)} 48%, ${rgbToCss(cBot)} 100%)`;
}

function applyStage4StemSlide(pts, elapsed) {
  let ox = 0;
  let oy = 0;
  if (elapsed > 12000) {
    const t = (elapsed - 12000) / 1000;
    ox = t * 16;
    oy = t * 24;
  }
  return pts.map(p => ({ x: p.x + ox, y: p.y + oy }));
}

function quadBezierPoint(p0, p1, p2, t) {
  const u = 1 - t;
  return {
    x: u * u * p0.x + 2 * u * t * p1.x + t * t * p2.x,
    y: u * u * p0.y + 2 * u * t * p1.y + t * t * p2.y
  };
}

function getStage4BezierControl() {
  const x0 = W * 0.06;
  const y0 = H * 0.07;
  const x1 = W * 0.84;
  const y1 = H * 0.78;
  const p0 = { x: x0, y: y0 };
  const p2 = { x: x1, y: y1 };
  const mx = (x0 + x1) / 2;
  const my = (y0 + y1) / 2;
  const dx = x1 - x0;
  const dy = y1 - y0;
  const dlen = Math.hypot(dx, dy) || 1;
  const nx = -dy / dlen;
  const ny = dx / dlen;
  const bend = Math.min(W, H) * 0.13;
  const p1 = { x: mx + nx * bend, y: my + ny * bend };
  return { p0, p1, p2 };
}

function getStage4StemTip(elapsed) {
  const { p0, p1, p2 } = getStage4BezierControl();
  const grow = Math.min(1, elapsed / 12000);
  const e = grow < 0.5 ? 4 * grow * grow * grow : 1 - Math.pow(-2 * grow + 2, 3) / 2;
  const p = quadBezierPoint(p0, p1, p2, e);
  return applyStage4StemSlide([p], elapsed)[0];
}

function buildStage4StemPoints(elapsed) {
  const { p0, p1, p2 } = getStage4BezierControl();
  const segs = 100;
  const grow = Math.min(1, elapsed / 12000);
  const e = grow < 0.5 ? 4 * grow * grow * grow : 1 - Math.pow(-2 * grow + 2, 3) / 2;
  const n = Math.max(2, Math.floor(1 + e * (segs - 1)));
  const pts = [];
  for (let i = 0; i < n; i++) {
    const t = (i / Math.max(1, n - 1)) * e;
    pts.push(quadBezierPoint(p0, p1, p2, t));
  }
  return applyStage4StemSlide(pts, elapsed);
}

function drawStage4GreenStem() {

// Wisteria flower cluster
class FloralParticle {
  constructor(x, y, color) {
    this.x = x; this.y = y;
    this.vx = (Math.random()-0.5)*3;
    this.vy = -Math.random()*4 - 1;
    this.life = 1;
    this.decay = 0.008 + Math.random()*0.012;
    this.size = 2 + Math.random()*5;
    this.color = color;
    this.rot = Math.random()*Math.PI*2;
    this.rotV = (Math.random()-0.5)*0.1;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.vy += 0.05;
    this.vx *= 0.99;
    this.life -= this.decay;
    this.rot += this.rotV;
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.life;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.beginPath();
    // petal shape
    ctx.ellipse(0, 0, this.size, this.size*0.5, 0, 0, Math.PI*2);
    ctx.fillStyle = this.color;
    ctx.fill();
    ctx.restore();
  }
}

/* ステージ2：茎周りの藤の花びらがゆっくり剥がれ落ちる */
class Stage2PeelingPetal {
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    this.color = color;
    this.size = 2.2 + Math.random() * 5;
    this.rot = Math.random() * Math.PI * 2;
    this.rotV = (Math.random() - 0.5) * 0.16;
    this.vx = (Math.random() - 0.5) * 1.4;
    this.vy = 0.15 + Math.random() * 0.45;
    this.life = 0.88 + Math.random() * 0.12;
    this.decay = 0.0012 + Math.random() * 0.002;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.032;
    this.vx *= 0.993;
    this.life -= this.decay;
    this.rot += this.rotV;
  }
  draw() {
    const a = Math.min(1, Math.max(0, this.life));
    ctx.save();
    ctx.globalAlpha = a;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.beginPath();
    ctx.ellipse(0, 0, this.size, this.size * 0.46, 0, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.fill();
    ctx.restore();
  }
}

function stage2PetalColor() {

function spawnStage2PeelingOnVines(count) {

// Vine class
class Vine {
  constructor(startX, startY) {
    this.points = [{x:startX, y:startY}];
    this.dirX = (Math.random()-0.5)*2;
    this.dirY = -Math.random()*1.5 - 0.5;
    this.life = 1;
    this.maxLen = 80 + Math.random()*120;
    this.width = 1 + Math.random()*2;
    this.age = 0;
    this.wiggle = Math.random()*100;
    this.growing = true;
    this.madness = false;
    // madness extras
    this.pulsePhase = Math.random()*Math.PI*2;
    this.children = []; // branch vines
    this.branchSpawned = false;
    this.thorns = [];
    this.speed = 1; // points per frame
    this.rebirthStem = false;
    this.rebirthHeartStem = false;
    this.rebirthT0 = 0;
    this.rebirthDuration = 20000;
    this.morphPhase = 'emerge';
    this.morphFrom = null;
    this.morphTo = null;
    this.heartEmergeReady = false;
    this.stemX = 0;
    this.stemEndY = 0;
    this.heartCx = 0;
    this.heartCy = 0;
    this.heartScale = 1;
    this.heartTBottom = 0;
  }
  update() {
    this.age++;
    if (this.rebirthStem && this.rebirthHeartStem) {
      const now = performance.now();
      const elapsed = now - this.rebirthT0;
      const t = Math.min(1, elapsed / this.rebirthDuration);
      const e = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      if (!this.heartEmergeReady) {
        this.morphFrom = buildStraightPolyline(this.stemX, H + 10, this.stemEndY, this.maxLen);
        this.morphTo = buildHeartOutline(
          this.heartCx, this.heartCy, this.heartScale, this.heartTBottom, this.maxLen
        );
        this.heartEmergeReady = true;
      }
      this.points = [];
      for (let i = 0; i < this.morphFrom.length; i++) {
        this.points.push({
          x: this.morphFrom[i].x + (this.morphTo[i].x - this.morphFrom[i].x) * e,
          y: this.morphFrom[i].y + (this.morphTo[i].y - this.morphFrom[i].y) * e
        });
      }
      this.morphPhase = t >= 1 ? 'done' : 'emerge';
      if (t >= 1) this.growing = false;
      this.children.forEach(c => c.update());
      return;
    }
    // madness vines grow faster over time
    const steps = this.madness ? Math.ceil(this.speed) : 1;
    for (let s = 0; s < steps; s++) {
      if (this.growing && this.points.length < this.maxLen) {
        const last = this.points[this.points.length-1];
        const noise = Math.sin(this.age*0.15 + this.wiggle)*1.5;
        let nx = last.x + this.dirX + noise;
        let ny = last.y + this.dirY;
        if (this.madness) {
          // erratic lurch
          nx += (Math.random()-0.5)*6;
          ny += (Math.random()-0.5)*5;
          // curve toward center, then overshoot
          const cx = W/2, cy = H/2;
          nx += (cx - last.x) * 0.004;
          ny += (cy - last.y) * 0.004;
          // accelerate as it grows
          this.speed = 1 + (this.points.length / this.maxLen) * 2.5;
          // random direction shifts
          if (Math.random() < 0.04) {
            this.dirX += (Math.random()-0.5)*1.5;
            this.dirY += (Math.random()-0.5)*1.5;
          }
          // spawn thorns
          if (Math.random() < 0.06) {
            this.thorns.push({
              idx: this.points.length,
              angle: Math.random()*Math.PI*2,
              len: 6 + Math.random()*12
            });
          }
        }
        this.points.push({x:nx, y:ny});
      } else {
        this.growing = false;
      }
    }
    // spawn branches mid-growth
    if (this.madness && !this.branchSpawned && this.points.length > this.maxLen * 0.4) {
      this.branchSpawned = true;
      const branchCount = 2 + Math.floor(Math.random()*3);
      for (let b = 0; b < branchCount; b++) {
        const srcIdx = Math.floor(this.points.length * (0.3 + Math.random()*0.5));
        const src = this.points[Math.min(srcIdx, this.points.length-1)];
        const child = new Vine(src.x, src.y);
        child.madness = true;
        child.maxLen = 40 + Math.random()*80;
        child.width = this.width * 0.55;
        child.dirX = (Math.random()-0.5)*4;
        child.dirY = (Math.random()-0.5)*4;
        child.speed = this.speed * 0.8;
        child.branchSpawned = true; // no grandchildren
        this.children.push(child);
      }
    }
    this.children.forEach(c => c.update());
  }
  draw() {
    this._drawSelf();
    this.children.forEach(c => c._drawSelf());
  }
  _drawSelf() {
    if (this.points.length < 2) return;
    const pulse = this.madness
      ? 0.5 + 0.5 * Math.sin(Date.now()*0.003 + this.pulsePhase)
      : 1;

    if (this.rebirthStem && this.rebirthHeartStem) {
      const now = performance.now();
      let r, gCol, b, alpha;
      if (this.morphPhase === 'done') {
        [r, gCol, b] = stage5ThemeStroke;
        alpha = 0.58;
      } else {
        const colorT = Math.min(1, (now - this.rebirthT0) / this.rebirthDuration);
        const pr = 130, pg = 65, pb = 195;
        const gr = 55, gg = 155, gb = 92;
        r = Math.round(pr + (gr - pr) * colorT);
        gCol = Math.round(pg + (gg - pg) * colorT);
        b = Math.round(pb + (gb - pb) * colorT);
        alpha = 0.42 + 0.18 * colorT;
      }
      ctx.beginPath();
      ctx.moveTo(this.points[0].x, this.points[0].y);
      for (let i = 1; i < this.points.length; i++) ctx.lineTo(this.points[i].x, this.points[i].y);
      ctx.strokeStyle = `rgba(${r},${gCol},${b},${alpha * 0.32})`;
      ctx.lineWidth = this.width * 5;
      ctx.shadowColor = `rgb(${r},${gCol},${b})`;
      ctx.shadowBlur = 14;
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.moveTo(this.points[0].x, this.points[0].y);
      for (let i = 1; i < this.points.length; i++) ctx.lineTo(this.points[i].x, this.points[i].y);
      ctx.strokeStyle = `rgba(${r},${gCol},${b},${alpha})`;
      ctx.lineWidth = this.width * 1.15;
      ctx.stroke();
      return;
    }

    // glow pass for madness
    if (this.madness) {
      ctx.beginPath();
      ctx.moveTo(this.points[0].x, this.points[0].y);
      for (let i = 1; i < this.points.length; i++) {
        const p = this.points[i];
        ctx.lineTo(p.x, p.y);
      }
      ctx.strokeStyle = `rgba(120,0,60,${0.15 * pulse})`;
      ctx.lineWidth = this.width * 5;
      ctx.shadowColor = '#600030';
      ctx.shadowBlur = 12;
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // main vine
    ctx.beginPath();
    ctx.moveTo(this.points[0].x, this.points[0].y);
    for (let i = 1; i < this.points.length; i++) {
      ctx.lineTo(this.points[i].x, this.points[i].y);
    }
    const alpha = this.madness ? 0.55 + 0.3*pulse : 0.5;
    ctx.strokeStyle = this.madness
      ? `rgba(${40+Math.floor(30*pulse)},0,${50+Math.floor(40*pulse)},${alpha})`
      : `rgba(120,60,180,0.5)`;
    ctx.lineWidth = this.madness ? this.width * (1 + 0.4*pulse) : this.width;
    ctx.stroke();

    // thorns
    if (this.madness && this.thorns.length) {
      this.thorns.forEach(t => {
        const p = this.points[Math.min(t.idx, this.points.length-1)];
        if (!p) return;
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(
          p.x + Math.cos(t.angle) * t.len,
          p.y + Math.sin(t.angle) * t.len
        );
        ctx.strokeStyle = `rgba(80,0,40,0.7)`;
        ctx.lineWidth = 0.8;
        ctx.stroke();
      });
    }

    // flower tip (non-madness)
    if (!this.growing && !this.madness) {
      const tip = this.points[this.points.length-1];
      ctx.beginPath();
      ctx.arc(tip.x, tip.y, 2, 0, Math.PI*2);
      ctx.fillStyle = `rgba(200,160,240,0.8)`;
      ctx.fill();
    }
    // madness tip: dripping dark bead
    if (!this.growing && this.madness) {
      const tip = this.points[this.points.length-1];
      ctx.beginPath();
      ctx.arc(tip.x, tip.y, 3 + 2*pulse, 0, Math.PI*2);
      ctx.fillStyle = `rgba(60,0,30,0.9)`;
      ctx.fill();
    }
  }
}

function heartShapeCanvas(t, cx, cy, scale) {
  const sx = 16 * Math.pow(Math.sin(t), 3);
  const rawY = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
  /* cy - rawY: ♡ の向き（上に二つの丸、下にとんがり）でテキストを包む */
  return { x: cx + scale * sx, y: cy - scale * rawY };
}

function findHeartBottomT(cx, cy, scale) {
  let tBottom = 0;
  let maxY = -Infinity;
  for (let t = 0; t < Math.PI * 2; t += 0.025) {
    const p = heartShapeCanvas(t, cx, cy, scale);
    if (p.y > maxY) {
      maxY = p.y;
      tBottom = t;
    }
  }
  return tBottom;
}

function buildHeartOutline(cx, cy, scale, tBottom, n) {
  const pts = [];
  for (let i = 0; i < n; i++) {
    const theta = tBottom + (i / n) * Math.PI * 2;
    pts.push(heartShapeCanvas(theta, cx, cy, scale));
  }
  return pts;
}

function buildStraightPolyline(stemX, y0, y1, n) {
  const pts = [];
  for (let i = 0; i < n; i++) {
    const fr = i / Math.max(1, n - 1);
    pts.push({ x: stemX, y: y0 + fr * (y1 - y0) });
  }
  return pts;
}

function drawStage5HeartFill(points, cx, cy, scale, themeIdx, opacityMult = 1) {
  if (!points || points.length < 3) return;
  const th = STAGE5_THEMES[themeIdx % STAGE5_THEMES.length];
  let maxR = scale * 16;
  for (let i = 0; i < points.length; i++) {
    const dx = points[i].x - cx;
    const dy = points[i].y - cy;
    maxR = Math.max(maxR, Math.hypot(dx, dy));
  }
  maxR *= 1.08;
  const g = ctx.createRadialGradient(cx, cy, maxR * 0.08, cx, cy, maxR);
  g.addColorStop(0, th.fillCenter);
  g.addColorStop(0.5, th.fillMid);
  g.addColorStop(1, th.fillEdge);
  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
  ctx.closePath();
  ctx.fillStyle = g;
  ctx.save();
  ctx.globalAlpha = opacityMult;
  ctx.fill();
  ctx.restore();
}

function initStage1() {
  vines = [];
  particles = [];
  // Spawn gentle wisteria vines from bottom
  for (let i = 0; i < 8; i++) {
    setTimeout(() => {
      const v = new Vine(Math.random()*W, H);
      vines.push(v);
    }, i * 400);
  }
}

function initStage2() {
  vines = [];
  particles = [];
  stage2DespairT0 = performance.now();

  // Wave 1: immediate burst from all 4 edges
  for (let i = 0; i < 12; i++) {
    const side = i % 4;
    let x, y;
    if (side===0) { x=Math.random()*W; y=0; }
    else if (side===1) { x=W; y=Math.random()*H; }
    else if (side===2) { x=Math.random()*W; y=H; }
    else { x=0; y=Math.random()*H; }
    const v = new Vine(x, y);
    v.madness = true;
    v.maxLen = 120 + Math.random()*180;
    v.width = 1.5 + Math.random()*3;
    v.dirX = (W/2 - x) * 0.012 + (Math.random()-0.5)*3;
    v.dirY = (H/2 - y) * 0.012 + (Math.random()-0.5)*3;
    vines.push(v);
  }

  // Wave 2: corners burst (delayed)
  const corners = [[0,0],[W,0],[0,H],[W,H]];
  corners.forEach((c, i) => {
    setTimeout(() => {
      if (currentStage !== 2) return;
      for (let j = 0; j < 4; j++) {
        const v = new Vine(c[0] + (Math.random()-0.5)*60, c[1] + (Math.random()-0.5)*60);
        v.madness = true;
        v.maxLen = 150 + Math.random()*200;
        v.width = 2 + Math.random()*3.5;
        v.dirX = (W/2 - c[0]) * 0.015 + (Math.random()-0.5)*4;
        v.dirY = (H/2 - c[1]) * 0.015 + (Math.random()-0.5)*4;
        vines.push(v);
      }
    }, 600 + i * 250);
  });

  // Wave 3: center explosion (delayed more)
  setTimeout(() => {
    if (currentStage !== 2) return;
    for (let i = 0; i < 10; i++) {
      const angle = (i / 10) * Math.PI * 2;
      const r = 30 + Math.random()*50;
      const v = new Vine(W/2 + Math.cos(angle)*r, H/2 + Math.sin(angle)*r);
      v.madness = true;
      v.maxLen = 100 + Math.random()*160;
      v.width = 1 + Math.random()*2.5;
      v.dirX = Math.cos(angle) * (2 + Math.random()*3);
      v.dirY = Math.sin(angle) * (2 + Math.random()*3);
      vines.push(v);
    }
  }, 1600);

  // Continuous spawn wave
  let spawnCount = 0;
  function spawnWave() {
    if (currentStage !== 2 || spawnCount > 8) return;
    spawnCount++;
    for (let i = 0; i < 3; i++) {
      const side = Math.floor(Math.random()*4);
      let x, y;
      if (side===0) { x=Math.random()*W; y=0; }
      else if (side===1) { x=W; y=Math.random()*H; }
      else if (side===2) { x=Math.random()*W; y=H; }
      else { x=0; y=Math.random()*H; }
      const v = new Vine(x, y);
      v.madness = true;
      v.maxLen = 80 + Math.random()*140;
      v.width = 1 + Math.random()*2;
      v.dirX = (W/2 - x) * 0.01 + (Math.random()-0.5)*3;
      v.dirY = (H/2 - y) * 0.01 + (Math.random()-0.5)*3;
      vines.push(v);
    }
    setTimeout(spawnWave, 800 + Math.random()*600);
  }
  setTimeout(spawnWave, 2500);

  // Pulse overlay
  const pulse = document.getElementById('pulse');
  pulse.style.animation = 'heartbeat 0.9s ease-in-out infinite';

  // Multiple screen shakes
  function shake(delay) {
    setTimeout(() => {
      if (currentStage !== 2) return;
      document.getElementById('stage').classList.add('shake');
      setTimeout(() => document.getElementById('stage').classList.remove('shake'), 600);
    }, delay);
  }
  shake(0); shake(1800); shake(3500); shake(5200);

  // 茎周りに藤の花を咲かせた直後から、12秒かけて花びらが剥がれ落ちる
  setTimeout(() => {
    if (currentStage !== 2) return;
    spawnStage2PeelingOnVines(140);
  }, 80);
}

function initStage3() {
  vines = [];
  particles = [];
  const pulse = document.getElementById('pulse');
  pulse.style.animation = 'none';
  pulse.style.opacity = '0';
}

function initStage4() {
  vines = [];
  particles = [];
}

function initStage5() {
  vines = [];
  particles = [];
  stage5ThemeT0 = 0;
  lastStage5ThemeIdx = -1;

  // === Phase 1: 甘い罠の残影 ===
  // 最初は暗い蔓が画面に残っているように見える（madness vinesを弱く生成）
  for (let i = 0; i < 6; i++) {
    const side = i % 4;
    let x, y;
    if (side===0) { x=Math.random()*W; y=0; }
    else if (side===1) { x=W; y=Math.random()*H; }
    else if (side===2) { x=Math.random()*W; y=H; }
    else { x=0; y=Math.random()*H; }
    const v = new Vine(x, y);
    v.madness = true;
    v.maxLen = 60 + Math.random()*80;
    v.width = 1 + Math.random()*1.5;
    v.dirX = (W/2 - x) * 0.008 + (Math.random()-0.5)*2;
    v.dirY = (H/2 - y) * 0.008 + (Math.random()-0.5)*2;
    v.speed = 0.5; // 弱く・遅く
    vines.push(v);
  }

  // === Phase 2: 変容 — 2秒後、光の茎が下から昇る ===
  setTimeout(() => {
    if (currentStage !== 5) return;
    // 暗い蔓を消していく（新しいvines配列に差し替え）
    vines = [];

    const heartCx = W / 2;
    const heartCy = H * 0.48;
    const heartScale = Math.min(W, H) * 0.034;
    const tBottom = findHeartBottomT(heartCx, heartCy, heartScale);
    const bottomPt = heartShapeCanvas(tBottom, heartCx, heartCy, heartScale);
    const stemEndY = bottomPt.y;

    const v = new Vine(heartCx, H + 10);
    v.madness = false;
    v.rebirthStem = true;
    v.rebirthHeartStem = true;
    v.rebirthT0 = performance.now();
    v.rebirthDuration = 20000;
    v.morphPhase = 'emerge';
    v.stemX = heartCx;
    v.stemEndY = stemEndY;
    v.heartCx = heartCx;
    v.heartCy = heartCy;
    v.heartScale = heartScale;
    v.heartTBottom = tBottom;
    v.maxLen = 220;
    v.width = 2.2;
    vines.push(v);

    setTimeout(() => {
      if (currentStage !== 5) return;
      const colors = ['#f5c6d8','#e8d4f0','#ffffff','#fce4f0','#d4a8e8'];
      for (let p = 0; p < 18; p++) {
        particles.push(new FloralParticle(
          heartCx + (Math.random() - 0.5) * 40,
          heartCy + (Math.random() - 0.5) * 40,
          colors[Math.floor(Math.random() * colors.length)]
        ));
      }
    }, 22400);
  }, 2000);

  // === Phase 3: ハート完成後、花びらが舞う ===
  setTimeout(() => {
    if (currentStage !== 5) return;
    const colors = ['#f5c6d8','#e8b4d0','#ffffff','#d4a8e8','#fce4f0','#ffe8f5'];

    // 底から大量の花びらが昇る
    let burstCount = 0;
    function bloomBurst() {
      if (currentStage !== 5 || burstCount > 20) return;
      burstCount++;
      for (let i = 0; i < 8; i++) {
        particles.push(new FloralParticle(
          Math.random() * W,
          H + 5,
          colors[Math.floor(Math.random() * colors.length)]
        ));
      }
      setTimeout(bloomBurst, 150);
    }
    bloomBurst();

    // 中心から放射状に光の粒
    for (let i = 0; i < 40; i++) {
      setTimeout(() => {
        if (currentStage !== 5) return;
        const angle = Math.random() * Math.PI * 2;
        const r = 20 + Math.random() * 60;
        particles.push(new FloralParticle(
          W/2 + Math.cos(angle) * r,
          H/2 + Math.sin(angle) * r,
          colors[Math.floor(Math.random() * colors.length)]
        ));
      }, i * 60);
    }

    // 光の風鈴音
    playWindChime();
    setTimeout(playWindChime, 1500);
  }, 22600);
}

// ─── Tap handler ──────────────────────────────────
let tapEnabled = true;

function handleTap(e) {
  if (!tapEnabled) return;
  resumeAudio();

  // Particle burst at tap
  const x = (e.touches ? e.touches[0].clientX : e.clientX) || W/2;
  const y = (e.touches ? e.touches[0].clientY : e.clientY) || H/2;
  if (currentStage === 1) {
    for (let i = 0; i < 15; i++) {
      particles.push(new FloralParticle(x, y, `hsl(${270+Math.random()*40},70%,${60+Math.random()*20}%)`));
    }
  }

  // Advance stage (not during choice or truth stage)
  if (currentStage === 3) return; // choice stage - handled by buttons
  if (currentStage < 5) goToStage(currentStage + 1);
}

document.addEventListener('click', handleTap);
document.addEventListener('touchstart', handleTap);

// ─── Choose ───────────────────────────────────────
function choose(c) {
  choice = c;
  tapEnabled = false;
  resumeAudio();
  setTimeout(() => {
    tapEnabled = true;
    goToStage(4);
  }, 500);
}

function shareStage5Message(e) {
  if (e) {
    e.stopPropagation();
    e.preventDefault();
  }
  resumeAudio();
  if (navigator.share) {
    navigator.share({ text: STAGE5_SHARE_TEXT }).catch(() => {});
  } else if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(STAGE5_SHARE_TEXT).catch(() => {});
  }
}

function goToStage1FromHome(e) {
  if (e) {
    e.stopPropagation();
    e.preventDefault();
  }
  resumeAudio();
  if (stage5ChromeTimer) {
    clearTimeout(stage5ChromeTimer);
    stage5ChromeTimer = null;
  }
  hideStage5ShareBar();
  choice = null;
  goToStage(1);
}

// ─── Go to Stage ─────────────────────────────────
function goToStage(n) {
  const s = stages[n - 1];
  if (!s) return;

  if (stage5ChromeTimer) {
    clearTimeout(stage5ChromeTimer);
    stage5ChromeTimer = null;
  }
  if (n !== SHARE_BAR_STAGE_INDEX) hideStage5ShareBar();

  if (currentStage === SHARE_BAR_STAGE_INDEX && n !== SHARE_BAR_STAGE_INDEX) stopStage5Voice();
  if (stage4TypeTimer) {
    clearInterval(stage4TypeTimer);
    stage4TypeTimer = null;
  }
  currentStage = n;
  applyMasterGainForStage(n);

  // Update bg
  const stageEl = document.getElementById('stage');
  if (n !== 4) {
    stageEl.style.background = '';
    stageEl.style.transition = '';
  }
  stageEl.className = s.bg;

  // Update dots
  for (let i = 0; i < 5; i++) {
    document.getElementById('d'+i).classList.toggle('active', i === n - 1);
  }

  // Update label
  document.getElementById('stageLabel').textContent = s.label;

  // Reset texts
  const mainText = document.getElementById('mainText');
  const subText = document.getElementById('subText');
  const truthBox = document.getElementById('truthBox');
  const choices = document.getElementById('choices');

  mainText.classList.remove('visible');
  subText.classList.remove('visible');
  truthBox.classList.remove('visible');
  choices.classList.remove('show','visible');

  mainText.innerHTML = '';
  subText.textContent = '';
  truthBox.innerHTML = '';
  truthBox.style.display = '';

  // Stage-specific content
  if (n === 3) {
    // Choice stage
    choices.classList.add('show');
    setTimeout(() => choices.classList.add('visible'), 100);
    mainText.textContent = s.text;
    setTimeout(() => mainText.classList.add('visible'), 300);
    document.getElementById('tapHint').style.display = 'none';
  } else if (n === 4) {
    // Truth stage（背景12秒グラデ／緑の茎／6〜12秒で先端から藤の花びら／中央に紫のタイプライター）
    stage4BgT0 = performance.now();
    stageEl.style.transition = 'none';
    stageEl.style.background = stage4AnimatedBackground(0);
    truthBox.style.display = 'block';
    truthBox.className = 'truth-box s4-truth-typewriter';
    truthBox.textContent = '';
    truthBox.classList.remove('visible');
    setTimeout(() => truthBox.classList.add('visible'), 150);
    const stage4TypeText =
      choice === 'stay' ? STAGE4_TYPEWRITER_TEXT_STAY : STAGE4_TYPEWRITER_TEXT;
    let ti = 0;
    stage4TypeTimer = setInterval(() => {
      if (currentStage !== 4) {
        clearInterval(stage4TypeTimer);
        stage4TypeTimer = null;
        return;
      }
      ti++;
      truthBox.textContent = stage4TypeText.slice(0, ti);
      if (ti >= stage4TypeText.length) {
        clearInterval(stage4TypeTimer);
        stage4TypeTimer = null;
      }
    }, 72);
    document.getElementById('tapHint').style.display = 'none';
    setTimeout(() => {
      document.getElementById('tapHint').style.display = 'block';
      document.getElementById('tapHint').textContent = '— tap to continue —';
      tapEnabled = true;
    }, 14000);
    tapEnabled = false;
  } else if (n === SHARE_BAR_STAGE_INDEX) {
    // Rebirth
    hideStage5ShareBar();
    truthBox.style.display = 'none';
    truthBox.textContent = '';
    truthBox.classList.remove('visible');
    stopStage5Voice();
    stage5ThemeT0 = 0;
    lastStage5ThemeIdx = -1;
    stage5ThemeStroke = [55, 155, 92];
    document.getElementById('tapHint').style.display = 'none';
    mainText.innerHTML =
      '<span class="s5-text-pink">あなたは<br>あなた自身を<br>愛でることを<br>覚えていった</span>' +
      '<p id="s5RotatingMsg" class="s5-rotating-msg" aria-live="polite"></p>';
    setTimeout(() => mainText.classList.add('visible'), 600);
    stage5ChromeTimer = setTimeout(() => {
      stage5ChromeTimer = null;
      if (currentStage === SHARE_BAR_STAGE_INDEX) showStage5ShareBar();
    }, 22000);
  } else {
    mainText.innerHTML = s.text.replace(/\n/g, '<br>');
    setTimeout(() => mainText.classList.add('visible'), 300);
    if (s.sub) {
      subText.textContent = s.sub;
      setTimeout(() => subText.classList.add('visible'), 500);
    }
    document.getElementById('tapHint').style.display = 'block';
    document.getElementById('tapHint').textContent = '— tap —';
  }

  // Audio
  if (s.audio) setTimeout(s.audio, 300);

  // Init visuals
  if (s.init) s.init();

  // Reset pulse for non-stage2
  if (n !== 2) {
    const pulse = document.getElementById('pulse');
    pulse.style.animation = 'none';
    pulse.style.opacity = '0';
  }
}

// ─── Draw Loop ───────────────────────────────────
function draw() {
  animId = requestAnimationFrame(draw);

  // Stage 2: afterimage (残像) — don't fully clear, overlay dark semi-transparent rect
  if (currentStage === 2) {
    ctx.fillStyle = 'rgba(10,0,16,0.18)';
    ctx.fillRect(0, 0, W, H);
  } else {
    ctx.clearRect(0, 0, W, H);
  }

  vines.forEach(v => { v.update(); });

  if (currentStage === 4 && stage4BgT0) {
    const t = Math.min(1, (performance.now() - stage4BgT0) / 12000);
    document.getElementById('stage').style.background = stage4AnimatedBackground(t);
  }

  stage5ThemeStroke = [55, 155, 92];
  if (currentStage === 5 && vines.length && vines[0].rebirthHeartStem) {
    const v = vines[0];
    if (v.morphPhase === 'done' && v.points.length > 2) {
      if (!stage5ThemeT0) stage5ThemeT0 = performance.now();
      const idx = Math.floor((performance.now() - stage5ThemeT0) / 10000) % 6;
      drawStage5HeartFill(v.points, v.heartCx, v.heartCy, v.heartScale, idx, 1);
      stage5ThemeStroke = STAGE5_THEMES[idx].stroke;
      updateStage5RotatingMessage(idx);
    } else if (v.morphPhase === 'emerge' && v.points.length > 2) {
      const elapsed = performance.now() - v.rebirthT0;
      const tLin = Math.min(1, elapsed / v.rebirthDuration);
      const e = tLin < 0.5 ? 4 * tLin * tLin * tLin : 1 - Math.pow(-2 * tLin + 2, 3) / 2;
      drawStage5HeartFill(v.points, v.heartCx, v.heartCy, v.heartScale, 0, Math.max(0.06, e) * 0.72);
    }
  } else if (currentStage !== 5) {
    stage5ThemeT0 = 0;
    lastStage5ThemeIdx = -1;
    stopStage5Voice();
  }

  vines.forEach(v => { v.draw(); });

  if (currentStage === 4) drawStage4GreenStem();

  // Stage 1: gentle ambient particles
  if (currentStage === 1 && Math.random() < 0.08) {
    particles.push(new FloralParticle(
      Math.random()*W, H/2 + Math.random()*(H/2),
      `hsla(${270+Math.random()*40},60%,70%,0.6)`
    ));
  }

  // Stage 4: 茎の先端付近から藤の花びらが舞う（6〜12秒、回転巻き付きの代わり）
  if (currentStage === 4 && stage4BgT0) {
    const el = performance.now() - stage4BgT0;
    if (el >= 6000 && el < 12000) {
      const fade = 1 - (el - 6000) / 6000;
      if (Math.random() < 0.24 + 0.18 * fade) {
        const tip = getStage4StemTip(el);
        const colors = [
          `hsla(${268 + Math.random() * 28},58%,${58 + Math.random() * 20}%,0.9)`,
          `hsla(${280 + Math.random() * 22},52%,${68 + Math.random() * 15}%,0.82)`
        ];
        particles.push(new FloralParticle(
          tip.x + (Math.random() - 0.5) * 32,
          tip.y + (Math.random() - 0.5) * 32,
          colors[Math.floor(Math.random() * colors.length)]
        ));
      }
    }
  }

  // Stage 2：12秒間、茎から花びらがゆっくり剝がれ落ちる（密度は時間とともに減少）
  if (currentStage === 2 && vines.length) {
    const elapsed = performance.now() - stage2DespairT0;
    if (elapsed < 12000) {
      const fade = 1 - elapsed / 12000;
      if (Math.random() < 0.028 * fade) spawnStage2PeelingOnVines(1);
    }
  }

  // Stage 5: continuous bloom（全体3倍、テーマ6「あなたの人生に彩りを」はさらに3倍＝従来比9倍）
  if (currentStage === 5 && Math.random() < 0.15) {
    let s5BloomMult = 3;
    const vv = vines[0];
    if (vv && vv.rebirthHeartStem && vv.morphPhase === 'done' && stage5ThemeT0) {
      if (Math.floor((performance.now() - stage5ThemeT0) / 10000) % 6 === 5) s5BloomMult = 9;
    }
    const colors = ['#f5c6d8','#e8b4d0','#ffffff','#d4a8e8'];
    for (let b = 0; b < s5BloomMult; b++) {
      particles.push(new FloralParticle(
        Math.random()*W, H,
        colors[Math.floor(Math.random()*colors.length)]
      ));
    }
  }

  // Update & draw particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => { p.update(); p.draw(); });
}

// ─── Stage 5 chrome (tap does not bubble into stage advance) ─
(function wireStage5Chrome() {
  const shareBtn = document.getElementById('s5ShareBtn');
  const backBtn = document.getElementById('backHome');
  const stopTap = (ev) => ev.stopPropagation();
  if (shareBtn) {
    shareBtn.addEventListener('click', shareStage5Message);
    shareBtn.addEventListener('touchstart', stopTap, { passive: true });
  }
  if (backBtn) {
    backBtn.addEventListener('click', goToStage1FromHome);
    backBtn.addEventListener('touchstart', stopTap, { passive: true });
  }
})();

// ─── Start ───────────────────────────────────────
goToStage(1);
draw();
</script>
